<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pins</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI Overlays -->
        <div id="ui-layer">
            <div id="main-menu" class="screen">
                <h1 class="neon-text">Neon Pins</h1>
                <p>Toque para atirar os pinos sem bater nos outros.</p>
                <div class="level-select">
                    <h2>Nível <span id="menu-level-display">1</span></h2>
                </div>
                <button id="start-btn" class="neon-button">JOGAR</button>
                <p id="total-stars" class="stars">Estrelas: <span>0</span></p>
            </div>
            
            <div id="hud" class="screen hidden">
                <div class="hud-top">
                    <span id="level-hud">Nível 1</span>
                </div>
                <div class="hud-bottom">
                    <span id="pins-left-hud">Pinos: 5</span>
                </div>
            </div>

            <div id="level-complete" class="screen hidden">
                <h1 class="neon-text success">Nível Concluído!</h1>
                <p>Excelente precisão!</p>
                <button id="next-level-btn" class="neon-button">PRÓXIMO NÍVEL</button>
                <button id="share-btn" class="neon-button alt">COMPARTILHAR</button>
            </div>

            <div id="game-over" class="screen hidden">
                <h1 class="neon-text error">Game Over</h1>
                <p>Você bateu em um pino!</p>
                <button id="restart-btn" class="neon-button">TENTAR NOVAMENTE</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
